{% extends 'base.html' %}

{% block content %}
<div class="dashboard">
    <header class="glass-nav">
        <div class="nav-brand">
            <i class="fas fa-flask"></i>
            <h2>IUT Lab Manager</h2>
        </div>
        <div class="nav-actions">
            <a href="{{ url_for('inventory') }}" class="btn btn-outline">
                <i class="fas fa-arrow-left"></i> Retour à l'inventaire
            </a>
        </div>
    </header>

    <main class="main-content flex-center">
        <div class="glass-card form-card">
            <div class="form-header">
                <h2>{{ action }} un produit</h2>
                <p>Remplissez les détails du produit ci-dessous.</p>
            </div>

            <form method="POST" class="product-form">
                <div class="form-group">
                    <label for="name">Nom du produit <span class="required">*</span></label>
                    <div class="input-with-icon">
                        <i class="fas fa-tag"></i>
                        <input type="text" id="name" name="name" value="{{ product.name if product else '' }}" required placeholder="Ex: Acide Chlorhydrique">
                    </div>
                </div>

                <div class="form-group">
                    <label for="item_type">Type de produit <span class="required">*</span></label>
                    <div class="input-with-icon">
                        <i class="fas fa-cubes"></i>
                        <select id="item_type" name="item_type" required class="form-select">
                            <option value="outil" {% if product and product.item_type == 'outil' %}selected{% endif %}>Outil</option>
                            <option value="consommable" {% if product and product.item_type == 'consommable' %}selected{% endif %}>Consommable</option>
                        </select>
                    </div>
                </div>

                <div class="form-group" id="pictograms_section" style="display: {% if product and product.item_type == 'consommable' %}block{% else %}none{% endif %};">
                    <label>Pictogrammes de sécurité</label>
                    <div class="pictograms-grid">
                        {% set p_list = product.picto_list if product else [] %}
                        <label class="picto-checkbox">
                            <input type="checkbox" name="pictograms" value="inflammable" {% if 'inflammable' in p_list %}checked{% endif %}>
                            <div class="picto-tile"><i class="fas fa-fire"></i><span>Inflammable</span></div>
                        </label>
                        <label class="picto-checkbox">
                            <input type="checkbox" name="pictograms" value="toxique" {% if 'toxique' in p_list %}checked{% endif %}>
                            <div class="picto-tile"><i class="fas fa-skull-crossbones"></i><span>Toxique</span></div>
                        </label>
                        <label class="picto-checkbox">
                            <input type="checkbox" name="pictograms" value="corrosif" {% if 'corrosif' in p_list %}checked{% endif %}>
                            <div class="picto-tile"><i class="fas fa-flask"></i><span>Corrosif</span></div>
                        </label>
                        <label class="picto-checkbox">
                            <input type="checkbox" name="pictograms" value="nocif" {% if 'nocif' in p_list %}checked{% endif %}>
                            <div class="picto-tile"><i class="fas fa-exclamation-triangle"></i><span>Nocif</span></div>
                        </label>
                        <label class="picto-checkbox">
                            <input type="checkbox" name="pictograms" value="explosif" {% if 'explosif' in p_list %}checked{% endif %}>
                            <div class="picto-tile"><i class="fas fa-bomb"></i><span>Explosif</span></div>
                        </label>
                        <label class="picto-checkbox">
                            <input type="checkbox" name="pictograms" value="environnement" {% if 'environnement' in p_list %}checked{% endif %}>
                            <div class="picto-tile"><i class="fas fa-tree"></i><span>Environnement</span></div>
                        </label>
                    </div>
                </div>

                <div class="form-group room-quantities-group">
                    <label>Stock par salle <span class="required">*</span></label>
                    <div class="quantities-grid">
                        <div class="qty-input">
                            <label for="qty_lab1"><i class="fas fa-microscope text-muted"></i> Labo 1</label>
                            <input type="number" id="qty_lab1" name="qty_lab1" value="{{ product.qty_lab1 if product else '0' }}" min="0" required>
                        </div>
                        <div class="qty-input">
                            <label for="qty_lab2"><i class="fas fa-vials text-muted"></i> Labo 2</label>
                            <input type="number" id="qty_lab2" name="qty_lab2" value="{{ product.qty_lab2 if product else '0' }}" min="0" required>
                        </div>
                        <div class="qty-input">
                            <label for="qty_reserve"><i class="fas fa-boxes text-muted"></i> Réserve</label>
                            <input type="number" id="qty_reserve" name="qty_reserve" value="{{ product.qty_reserve if product else '0' }}" min="0" required>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <div class="input-with-icon textarea-icon">
                        <i class="fas fa-align-left"></i>
                        <textarea id="description" name="description" rows="4" placeholder="Détails supplémentaires...">{{ product.description if product else '' }}</textarea>
                    </div>
                </div>

                <div class="form-actions" style="margin-top: 1rem; padding-top: 2rem; border-top: 1px solid rgba(255,255,255,0.1);">
                    <a href="{{ url_for('inventory') }}" class="btn btn-secondary">Annuler</a>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> {{ action }} le produit
                    </button>
                </div>
            </form>
        </div>
    </main>
</div>

<!-- Background Elements -->
<div class="blob blob-1 dashboard-blob"></div>
<div class="blob blob-3 dashboard-blob"></div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const typeSelector = document.getElementById('item_type');
    const pictogramsSection = document.getElementById('pictograms_section');

    typeSelector.addEventListener('change', function() {
        if (this.value === 'consommable') {
            pictogramsSection.style.display = 'block';
            pictogramsSection.style.animation = 'fadeIn 0.3s forwards';
        } else {
            pictogramsSection.style.display = 'none';
        }
    });
});
</script>
{% endblock %}
